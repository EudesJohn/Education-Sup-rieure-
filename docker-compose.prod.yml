# ============================================================
# Docker Compose — Production (Supabase + Groq uniquement)
# ============================================================
# Usage :
#   docker compose -f docker-compose.prod.yml up -d
#
# Aucune infrastructure locale requise :
#   - Base de données : Supabase
#   - Stockage fichiers : Supabase Storage
#   - Cache : Supabase (app_cache)
#   - IA : Groq (llama-3.3-70b-versatile)
#
# Variables d'environnement à définir :
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, JWT_SECRET_KEY, GROQ_API_KEY
# ============================================================

version: "3.8"

services:
  # === Reverse Proxy Nginx (point d'entrée) ===
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: pean-nginx
    ports:
      - "80:80"
      - "443:443"  # HTTPS (si certificats SSL montes)
    volumes:
      # Montage optionnel pour les certificats SSL (Let's Encrypt)
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  # === API Backend ===
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: pean-api
    # Pas de port exposé en production — tout passe par nginx
    expose:
      - "8000"
    environment:
      DEBUG: "false"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: "llama-3.3-70b-versatile"
      CORS_ORIGINS: '["https://votre-domaine.com"]'
      LOG_LEVEL: "INFO"
      LOG_FILE: "/app/logs/pean.log"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
